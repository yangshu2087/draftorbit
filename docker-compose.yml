services:
  postgres:
    image: postgres:16-alpine
    container_name: draftorbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: draftorbit
      POSTGRES_USER: draftorbit
      POSTGRES_PASSWORD: draftorbit
    ports:
      - '5433:5432'
    volumes:
      - draftorbit-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U draftorbit -d draftorbit']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: draftorbit-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: draftorbit-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://draftorbit:draftorbit@postgres:5432/draftorbit
      REDIS_URL: redis://redis:6379
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '4000:4000'

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: draftorbit-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://draftorbit:draftorbit@postgres:5432/draftorbit
      REDIS_URL: redis://redis:6379

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: draftorbit-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'

volumes:
  draftorbit-pgdata:

