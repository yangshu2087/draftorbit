name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web required checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.23.0
          run_install: false

      - name: Setup Node.js with pnpm store cache
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Playwright Chromium cache
        id: playwright-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Record CI runtime and cache inputs
        env:
          PLAYWRIGHT_CACHE_HIT: ${{ steps.playwright-cache.outputs.cache-hit }}
          PLAYWRIGHT_CACHE_KEY: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        run: |
          {
            echo "### CI runtime and cache settings"
            echo
            echo "| setting | value |"
            echo "| --- | ---: |"
            echo "| JavaScript actions Node 24 opt-in | ${FORCE_JAVASCRIPT_ACTIONS_TO_NODE24} |"
            echo "| Playwright Chromium cache hit | ${PLAYWRIGHT_CACHE_HIT:-false} |"
            echo "| Playwright Chromium cache key | ${PLAYWRIGHT_CACHE_KEY} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @draftorbit/web exec playwright install --with-deps chromium

      - name: Web typecheck
        run: pnpm --filter @draftorbit/web typecheck

      - name: Web test (required)
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_API_URL: /__api
          NEXT_PUBLIC_ENABLE_LOCAL_LOGIN: 'true'
          WEB_PLAYWRIGHT_PORT: 3300
          WEB_PLAYWRIGHT_WORKERS: '2'
          WEB_PLAYWRIGHT_REPORTER_TARGET_SECONDS: '10'
          WEB_PLAYWRIGHT_REPORTER_HARD_BUDGET_SECONDS: '12'
          WEB_PLAYWRIGHT_ENFORCE_BUDGET: '1'
        run: |
          start_seconds=$(date +%s)
          set +e
          pnpm --filter @draftorbit/web test
          status=$?
          end_seconds=$(date +%s)
          wall_seconds=$((end_seconds - start_seconds))
          {
            echo "### Web test step timing"
            echo
            echo "| metric | value |"
            echo "| --- | ---: |"
            echo "| CI web test step wall time | ${wall_seconds}s |"
            echo "| exit code | ${status} |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Web build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_API_URL: /__api
          NEXT_PUBLIC_ENABLE_LOCAL_LOGIN: 'true'
        run: pnpm --filter @draftorbit/web build

      - name: Save Playwright Chromium cache
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: web-playwright-artifacts
          if-no-files-found: ignore
          retention-days: 7
          path: |
            output/playwright/web-ci
